name: BriefIt AI Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Run at the top of every hour
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY_SUMMARIZE: ${{ secrets.GROQ_API_KEY_SUMMARIZE }}
          GROQ_API_KEY_SENTIMENT: ${{ secrets.GROQ_API_KEY_SENTIMENT }}
          JWT_SECRET_KEY: "dummy_secret_for_pipeline"
        run: |
          python -m scripts.run_pipeline_once
